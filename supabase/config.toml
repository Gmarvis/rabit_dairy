# Supabase CLI config. `supabase link --project-ref <ref>` connects this to your
# hosted project; `supabase db push` applies supabase/migrations to it.
project_id = "rabbit-diary"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# Local dev URL; add your production/app scheme in the dashboard for real builds.
site_url = "rabbitdiary://"
additional_redirect_urls = ["rabbitdiary://", "exp://"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
enable_signup = true

[auth.email]
enable_signup = true
# For quick local testing; require confirmation in production.
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "10MiB"
